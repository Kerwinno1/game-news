<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026 官网动态追踪</title>
    <style>
        :root { --mc: #00f2ff; --val: #ff4655; --hsr: #d2aa6d; --bg: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        header { border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .filters { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid #444; background: #21262d; color: white; font-weight: bold; }
        .btn:hover { border-color: #8b949e; }
        .active-all { border-color: white; }
        .active-mc { border-color: var(--mc); color: var(--mc); }
        .active-val { border-color: var(--val); color: var(--val); }
        .active-hsr { border-color: var(--hsr); color: var(--hsr); }
        .btn-refresh { background: #238636; border: none; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-decoration: none; color: inherit; display: block; border-left: 5px solid transparent; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); background: #1c2128; border-color: #8b949e; }
        .card[data-game="鸣潮"] { border-left-color: var(--mc); }
        .card[data-game="无畏契约"] { border-left-color: var(--val); }
        .card[data-game="星铁"] { border-left-color: var(--hsr); }
        .title { font-size: 15px; font-weight: bold; margin-bottom: 10px; line-height: 1.4; height: 42px; overflow: hidden; }
        .date { font-size: 11px; color: #8b949e; }
    </style>
</head>
<body>
<header>
    <div class="top-row">
        <div>
            <h2 style="margin:0;">📡 2026 官网巡逻站</h2>
            <small id="status">正在同步 2026 官方动态...</small>
        </div>
        <button class="btn btn-refresh" onclick="fetchData()">手动检查更新</button>
    </div>
    <div class="filters">
        <button class="btn active-all" id="b-all" onclick="filterData('全部')">全部</button>
        <button class="btn" id="b-mc" onclick="filterData('鸣潮')">鸣潮</button>
        <button class="btn" id="b-val" onclick="filterData('无畏契约')">无畏契约</button>
        <button class="btn" id="b-hsr" onclick="filterData('星铁')">星铁</button>
    </div>
</header>
<div class="news-grid" id="container">连接 2026 官网频道中...</div>

<script>
    let rawNews = [];
    async function fetchData() {
        const status = document.getElementById('status');
        const container = document.getElementById('container');
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        const rss = `https://www.gamersky.com/rss/news.xml?t=${new Date().getTime()}`;

        try {
            const res = await fetch(proxy + encodeURIComponent(rss));
            const data = await res.json();
            if (data.status === 'ok') {
                rawNews = data.items.map(item => {
                    const t = item.title;
                    const d = new Date(item.pubDate);
                    // 仅显示 2026 年动态
                    if (d.getFullYear() >= 2026) {
                        let game = "";
                        if (t.includes('鸣潮')) game = "鸣潮";
                        if (t.match(/无畏契约|瓦罗兰特|VALORANT/i)) game = "无畏契约";
                        if (t.match(/星穹铁道|崩铁|HSR/i)) game = "星铁";
                        return game ? { title: t, link: item.link, date: d, game } : null;
                    }
                    return null;
                }).filter(x => x !== null);
                render(rawNews);
                status.innerText = "最后巡逻: " + new Date().toLocaleTimeString();
            }
        } catch (e) {
            status.innerText = "同步失败，请检查网络";
        }
    }

    function render(data) {
        const container = document.getElementById('container');
        if (data.length === 0) {
            container.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:50px;">2026 年暂无官方公开新公告。</p>';
            return;
        }
        container.innerHTML = data.map(n => `
            <a href="${n.link}" target="_blank" class="card" data-game="${n.game}">
                <div style="font-size:10px;font-weight:bold;margin-bottom:5px;color:var(--${n.game === '鸣潮' ? 'mc' : (n.game === '无畏契约' ? 'val' : 'hsr')})">${n.game} 官方</div>
                <div class="title">${n.title}</div>
                <div class="date">${n.date.toLocaleString()}</div>
            </a>
        `).join('');
    }

    function filterData(type) {
        document.querySelectorAll('.filters .btn').forEach(b => b.className = 'btn');
        const btnMap = { '全部': 'b-all', '鸣潮': 'b-mc', '无畏契约': 'b-val', '星铁': 'b-hsr' };
        const clsMap = { '全部': 'active-all', '鸣潮': 'active-mc', '无畏契约': 'active-val', '星铁': 'active-hsr' };
        document.getElementById(btnMap[type]).classList.add(clsMap[type]);
        render(type === '全部' ? rawNews : rawNews.filter(n => n.game === type));
    }

    fetchData();
    setInterval(fetchData, 1800000); // 半小时自刷
</script>
</body>
</html>
